{% extends 'base.html' %}

{% load static %}

{% block content %}

{% include 'partial/header.html' %}

<div class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white">
    <div class="max-w-7xl mx-auto p-4">
        <!-- Flex container for input/output -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <!-- JSON Input -->
        <div>
            <label for="json-input" class="block mb-1 font-semibold">JSON Input</label>
            <textarea id="json-input" rows="20" class="w-full text-sm p-2 bg-white dark:bg-gray-800 border rounded focus:outline-none focus:ring dark:text-white placeholder-gray-400 dark:placeholder-gray-500" placeholder="Paste your JSON here..."></textarea>
        </div>
        <!-- JSON Output -->
        <div>
            <label for="json-output" class="block mb-1 font-semibold">Formatted Output</label>
            <textarea id="json-output" rows="20" class="w-full text-sm p-2 bg-gray-100 dark:bg-gray-800 border rounded focus:outline-none dark:text-white placeholder-gray-400 dark:placeholder-gray-500" placeholder="Formatted JSON will appear here..." readonly></textarea>
        </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-2 justify-center">
        <button onclick="formatJson()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">🧹 Format / Beautify</button>
        <button onclick="minifyJson()" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">🪄 Minify</button>
        <button onclick="copyOutput()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">📋 Copy</button>
        <button onclick="downloadJson()" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600">💾 Download</button>
        <button onclick="openSaveModal()" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-800">☁ Save Online</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="saveModal" class="fixed inset-0 z-50 bg-black bg-opacity-50 hidden justify-center items-center" onclick="closeSaveModal()">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 w-full max-w-md" onclick="event.stopPropagation()">
        <h2 class="text-xl font-semibold mb-4">Save JSON Online</h2>
        <input type="text" placeholder="Optional Title" class="w-full mb-2 p-2 rounded border dark:bg-gray-700" id="jsonTitle">
        <textarea placeholder="Optional Description" class="w-full mb-2 p-2 rounded border dark:bg-gray-700" rows="3" id="jsonDescription"></textarea>
        <label class="block mb-2">Expiration</label>
        <select id="expiryTime" class="w-full mb-4 p-2 rounded border dark:bg-gray-700">
            <option value="24">24 hours</option>
            <option value="48">48 hours</option>
            <option value="168">7 days</option>
            <option value="720">30 days</option>
        </select>
        <div class="flex justify-end space-x-2">
            <button onclick="closeSaveModal()" class="px-4 py-2 bg-gray-300 rounded dark:bg-gray-600">Cancel</button>
            <button onclick="saveOnline()" class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
        </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('json-input');
        const output = document.getElementById('json-output');

        function formatJson() {
        try {
            const json = JSON.parse(input.value);
            output.value = JSON.stringify(json, null, 2);
        } catch (e) {
            alert('Invalid JSON');
        }
        }

        function minifyJson() {
        try {
            const json = JSON.parse(input.value);
            output.value = JSON.stringify(json);
        } catch (e) {
            alert('Invalid JSON');
        }
        }

        function copyOutput() {
        navigator.clipboard.writeText(output.value).then(() => alert("Copied!"));
        }

        function downloadJson() {
        const blob = new Blob([output.value], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "formatted.json";
        a.click();
        URL.revokeObjectURL(url);
        }

        function openSaveModal() {
        document.getElementById("saveModal").classList.remove("hidden");
        document.getElementById("saveModal").classList.add("flex");
        }

        function closeSaveModal() {
        document.getElementById("saveModal").classList.remove("flex");
        document.getElementById("saveModal").classList.add("hidden");
        }

        function saveOnline() {
        const data = {
            title: document.getElementById("jsonTitle").value,
            description: document.getElementById("jsonDescription").value,
            content: output.value,
            expiry: document.getElementById("expiryTime").value
        };
        console.log("Saving JSON online:", data);
        alert("Saved! (mock)");
        closeSaveModal();
        }
    </script>
</div>

{% endblock %}
