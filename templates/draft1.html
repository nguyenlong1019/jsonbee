<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white">
  <div class="min-h-screen p-4 max-w-7xl mx-auto">
    <form>
      <div class="w-full mb-4 border border-gray-200 rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600">
        <!-- Toolbar -->
        <div class="flex items-center justify-between px-3 py-2 border-b border-gray-200 dark:border-gray-600">
          <div class="flex flex-wrap items-center divide-gray-200 sm:divide-x sm:rtl:divide-x-reverse dark:divide-gray-600">
            <div class="flex items-center space-x-1 rtl:space-x-reverse sm:pe-4">
              <button type="button" id="beautifyBtn" class="p-2 text-gray-500 rounded-sm hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-600">
                🧹 Format / Beautify
              </button>
              <button type="button" id="minifyBtn" class="p-2 text-gray-500 rounded-sm hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-600">
                🪄 Minify
              </button>
              <button type="button" id="copyBtn" class="p-2 text-gray-500 rounded-sm hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-600">
                📋 Copy
              </button>
              <button type="button" id="downloadBtn" class="p-2 text-gray-500 rounded-sm hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-600">
                💾 Download
              </button>
              <button type="button" id="saveBtn" class="p-2 text-gray-500 rounded-sm hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-600">
                ☁ Save Online
              </button>
            </div>
          </div>
        </div>

        <!-- Textarea -->
        <div class="px-4 py-2 bg-white rounded-b-lg dark:bg-gray-800">
          <label for="jsonInput" class="sr-only">Your JSON</label>
          <textarea id="jsonInput" rows="16" class="block w-full px-0 text-sm text-gray-800 bg-white border-0 dark:bg-gray-800 focus:ring-0 dark:text-white dark:placeholder-gray-400" placeholder="Paste your JSON here..." required></textarea>
        </div>
      </div>
    </form>
  </div>

  <!-- Modal -->
  <div id="saveModal" class="fixed inset-0 z-50 bg-black bg-opacity-50 hidden justify-center items-center">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 w-full max-w-md">
      <h2 class="text-xl font-semibold mb-4">Save JSON Online</h2>
      <input type="text" placeholder="Optional Title" class="w-full mb-2 p-2 rounded border dark:bg-gray-700" id="jsonTitle">
      <textarea placeholder="Optional Description" class="w-full mb-2 p-2 rounded border dark:bg-gray-700" rows="3" id="jsonDescription"></textarea>
      <label class="block mb-2">Expiration</label>
      <select id="expiryTime" class="w-full mb-4 p-2 rounded border dark:bg-gray-700">
        <option value="24">24 hours</option>
        <option value="48">48 hours</option>
        <option value="168">7 days</option>
        <option value="720">30 days</option>
      </select>
      <div class="flex justify-end space-x-2">
        <button id="cancelSave" class="px-4 py-2 bg-gray-300 rounded dark:bg-gray-600">Cancel</button>
        <button id="confirmSave" class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
      </div>
    </div>
  </div>

  <script>
    const jsonInput = document.getElementById("jsonInput");

    document.getElementById("beautifyBtn").onclick = () => {
      try {
        const parsed = JSON.parse(jsonInput.value);
        jsonInput.value = JSON.stringify(parsed, null, 2);
      } catch (e) {
        alert("Invalid JSON");
      }
    };

    document.getElementById("minifyBtn").onclick = () => {
      try {
        const parsed = JSON.parse(jsonInput.value);
        jsonInput.value = JSON.stringify(parsed);
      } catch (e) {
        alert("Invalid JSON");
      }
    };

    document.getElementById("copyBtn").onclick = () => {
      navigator.clipboard.writeText(jsonInput.value).then(() => alert("Copied!"));
    };

    document.getElementById("downloadBtn").onclick = () => {
      const blob = new Blob([jsonInput.value], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "data.json";
      a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById("saveBtn").onclick = () => {
      document.getElementById("saveModal").classList.remove("hidden");
      document.getElementById("saveModal").classList.add("flex");
    };

    document.getElementById("cancelSave").onclick = () => {
      document.getElementById("saveModal").classList.add("hidden");
      document.getElementById("saveModal").classList.remove("flex");
    };

    document.getElementById("confirmSave").onclick = () => {
      const data = {
        title: document.getElementById("jsonTitle").value,
        description: document.getElementById("jsonDescription").value,
        content: jsonInput.value,
        expiry: document.getElementById("expiryTime").value
      };
      console.log("Saving JSON online", data);
      alert("Saved! (mock)");
      document.getElementById("saveModal").classList.add("hidden");
    };
  </script>
</body>
</html>
